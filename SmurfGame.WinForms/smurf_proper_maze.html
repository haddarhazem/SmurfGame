
<style>
canvas { display: block; width: 100%; }
</style>
<canvas id="c" width="680" height="520"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 680, H = 520;

const COLS = 17, ROWS = 13;
const CELL_W = Math.floor((W - 40) / COLS);
const CELL_H = Math.floor((H - 40 - 60) / ROWS);
const OX = 20, OY = 40;

// Each cell stores which walls are open: N, S, E, W
const cells = Array.from({length: ROWS}, () =>
  Array.from({length: COLS}, () => ({ n: true, s: true, e: true, w: true, visited: false }))
);

function idx(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

function carve(r, c) {
  cells[r][c].visited = true;
  const dirs = [{dr:-1,dc:0,w:'n',ow:'s'},{dr:1,dc:0,w:'s',ow:'n'},{dr:0,dc:1,w:'e',ow:'w'},{dr:0,dc:-1,w:'w',ow:'e'}];
  dirs.sort(() => Math.random() - 0.5);
  for (const {dr, dc, w, ow} of dirs) {
    const nr = r + dr, nc = c + dc;
    if (idx(nr, nc) && !cells[nr][nc].visited) {
      cells[r][c][w] = false;
      cells[nr][nc][ow] = false;
      carve(nr, nc);
    }
  }
}

// Seed RNG for consistent look
Math.seedrandom = function(seed) {
  let s = seed;
  Math.random = function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
};
Math.seedrandom(42);
carve(0, 0);

// ── DRAW ──────────────────────────────────────────────────────
// Sky
const skyGrad = ctx.createLinearGradient(0, 0, 0, OY + 10);
ctx.fillStyle = '#0f1c2e';
ctx.fillRect(0, 0, W, OY + CELL_H * 0.5);

// Stars
const stars = [[45,8],[110,22],[180,6],[250,28],[340,14],[410,5],[470,26],[535,10],[595,30],[648,18],[80,38],[290,42],[510,36]];
for (const [sx, sy] of stars) {
  ctx.beginPath();
  ctx.arc(sx, sy, 1.1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(230,240,255,0.85)';
  ctx.fill();
}
// Moon
ctx.beginPath(); ctx.arc(580, 28, 20, 0, Math.PI*2); ctx.fillStyle = '#fff8dc'; ctx.fill();
ctx.beginPath(); ctx.arc(592, 21, 15, 0, Math.PI*2); ctx.fillStyle = '#0f1c2e'; ctx.fill();

// Ground fill
ctx.fillStyle = '#2a5224';
ctx.fillRect(0, OY - 10, W, H - OY + 10);

// Distant tree silhouette
ctx.fillStyle = '#162e14';
for (const [cx2, r2] of [[60,38],[180,44],[330,36],[490,42],[630,38]]) {
  ctx.beginPath(); ctx.ellipse(cx2, OY, r2*1.6, r2, 0, 0, Math.PI*2); ctx.fill();
}

// ── MAZE FLOOR (path cells) ──
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const x = OX + c * CELL_W, y = OY + r * CELL_H;
    ctx.fillStyle = '#2d5a27';
    ctx.fillRect(x + 1, y + 1, CELL_W - 1, CELL_H - 1);
  }
}

// ── MAZE WALLS ──
const WALL_COLOR = '#1a3d18';
const WALL = 6;

ctx.strokeStyle = WALL_COLOR;
ctx.lineWidth = WALL;
ctx.lineCap = 'square';

// Outer border
ctx.strokeRect(OX, OY, COLS * CELL_W, ROWS * CELL_H);

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const x = OX + c * CELL_W, y = OY + r * CELL_H;
    const cell = cells[r][c];

    ctx.beginPath();
    if (cell.s && r < ROWS - 1) {
      ctx.moveTo(x, y + CELL_H);
      ctx.lineTo(x + CELL_W, y + CELL_H);
    }
    if (cell.e && c < COLS - 1) {
      ctx.moveTo(x + CELL_W, y);
      ctx.lineTo(x + CELL_W, y + CELL_H);
    }
    ctx.stroke();
  }
}

// ── WALL TEXTURE: add hedge look ──
ctx.strokeStyle = '#245c1e';
ctx.lineWidth = 2;
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const x = OX + c * CELL_W, y = OY + r * CELL_H;
    const cell = cells[r][c];
    ctx.beginPath();
    if (cell.s && r < ROWS - 1) {
      ctx.moveTo(x + 2, y + CELL_H - 2);
      ctx.lineTo(x + CELL_W - 2, y + CELL_H - 2);
    }
    if (cell.e && c < COLS - 1) {
      ctx.moveTo(x + CELL_W - 2, y + 2);
      ctx.lineTo(x + CELL_W - 2, y + CELL_H - 2);
    }
    ctx.stroke();
  }
}

// ── GRASS TUFTS on path cells ──
function drawTuft(tx, ty) {
  ctx.fillStyle = '#3a7232';
  ctx.beginPath(); ctx.ellipse(tx, ty, 3, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#44843b';
  ctx.beginPath(); ctx.ellipse(tx+5, ty, 2.5, 5, 0.2, 0, Math.PI*2); ctx.fill();
}
const tuftPositions = [[170,140],[430,220],[60,310],[560,340],[250,400],[480,440],[100,460],[370,480]];
for (const [tx, ty] of tuftPositions) drawTuft(tx, ty);

// ── BORDER TREES ──
function drawTree(tx, ty, size) {
  ctx.fillStyle = '#4a3018';
  ctx.fillRect(tx - 3, ty, 6, size * 1.5);
  ctx.fillStyle = '#1b5e28';
  ctx.beginPath(); ctx.ellipse(tx, ty - size*0.6, size, size*1.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#216830';
  ctx.beginPath(); ctx.ellipse(tx - size*0.5, ty, size*0.65, size*0.9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#174e20';
  ctx.beginPath(); ctx.ellipse(tx + size*0.55, ty - size*0.2, size*0.6, size*0.85, 0, 0, Math.PI*2); ctx.fill();
}
drawTree(8,   OY - 10, 22);
drawTree(672, OY - 10, 22);
drawTree(340, OY - 14, 20);
drawTree(180, OY - 8,  17);
drawTree(500, OY - 8,  17);

// ── BOTTOM INFO STRIP ──
const BY = OY + ROWS * CELL_H + 10;
ctx.fillStyle = '#162e14';
ctx.fillRect(0, BY - 4, W, H - BY + 4);

ctx.fillStyle = '#a8c89a';
ctx.font = '12px sans-serif';
ctx.fillText('Maze: ' + COLS + ' × ' + ROWS + ' cells  |  Every path is reachable  |  TileSize: ' + CELL_W + 'px × ' + CELL_H + 'px', 24, BY + 14);

// Entry / Exit markers
ctx.fillStyle = '#7ecf5a';
ctx.beginPath(); ctx.arc(OX + CELL_W/2, OY + CELL_H/2, 6, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#e84040';
ctx.beginPath(); ctx.arc(OX + (COLS - 0.5)*CELL_W, OY + (ROWS - 0.5)*CELL_H, 6, 0, Math.PI*2); ctx.fill();


</script>
